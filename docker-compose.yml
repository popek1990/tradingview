services:
  webhook:
    build: .
    container_name: TView_to_social
    ports:
      - "127.0.0.1:80:1990"  # Localhost only — cloudflared connects locally
    volumes:
      - ./.env:/usr/src/app/.env:ro  # Read-only for webhook (doesn't write to .env)
      - ./templates.json:/usr/src/app/templates.json:ro
      - ./aliases.json:/usr/src/app/aliases.json:ro
      - logs:/usr/src/app/logs
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: always

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: TView_to_social-Dashboard
    ports:
      # For Cloudflare Tunnel deployments: change to "127.0.0.1:8501:8501" for extra security
      - "0.0.0.0:8501:8501"  # Available on LAN — protected by password (DASHBOARD_PASSWORD)
    environment:
      - WEBHOOK_URL=http://webhook:1990
    volumes:
      - ./.env:/usr/src/app/.env
      - ./templates.json:/usr/src/app/templates.json
      - ./aliases.json:/usr/src/app/aliases.json
      - logs:/usr/src/app/logs
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: always
    depends_on:
      - webhook

volumes:
  logs:
