[server]
# XSRF and CORS enabled (security)
enableXsrfProtection = true
enableCORS = true
# Headless mode (Docker, no browser)
headless = true

[browser]
# Don't collect usage stats
gatherUsageStats = false

[theme]
base="dark"
primaryColor="#00FF41"
backgroundColor="#0D1117"
secondaryBackgroundColor="#161B22"
textColor="#C9D1D9"
font="monospace"
